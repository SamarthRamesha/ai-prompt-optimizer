<!DOCTYPE html>
<html>
<head>
  <title>Prompt Optimizer</title>
  <style>
    body {
      width: 300px;
      font-family: Arial;
      padding: 10px;
    }
    textarea {
      width: 100%;
      height: 80px;
    }
    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
    }
    #output {
      margin-top: 10px;
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <h3>Optimize Prompt</h3>

  <textarea id="prompt" placeholder="Enter your prompt..."></textarea>

  <button id="optimizeBtn">Optimize</button>

  <div id="output"></div>

  <script src="popup.js"></script>
</body>
</html>
